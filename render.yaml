# Render.com blueprint — web service + managed PostgreSQL (persistent).
# Deploy: push to GitHub, then "New +" -> "Blueprint" in Render and point it at this repo.
# Set ADMIN_PASSWORD and AUTH_SECRET as secret env vars in the Render dashboard.
services:
  - type: web
    name: hl-sales-receivables
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hl-postgres
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false # set this secret in the Render dashboard

databases:
  - name: hl-postgres
    plan: starter
    databaseName: hl
    user: hl
