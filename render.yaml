# Render.com blueprint — web service + managed PostgreSQL (persistent).
# Deploy: push to GitHub, then "New +" -> "Blueprint" in Render and point it at this repo.
# Set ADMIN_PASSWORD as a secret env var in the Render dashboard.
services:
  - type: web
    name: hl-sales-receivables
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hl-postgres
          property: connectionString
      # AUTH_SECRET is baked into the image at build time (Next inlines it into the
      # Edge middleware), so a runtime-only value would mismatch and break sessions.
      # A random secret is baked when unset; to pin one, pass it as a Docker build arg.
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false # set this secret in the Render dashboard

databases:
  - name: hl-postgres
    plan: starter
    databaseName: hl
    user: hl
