# n8n self-hosted stack — n8n + PostgreSQL (persistent).
#
# Portable by design: runs locally with `docker compose up -d` and deploys to any
# Docker host (a VPS, Render, Railway, Fly.io, …). NOT for Vercel — n8n is a
# long-running stateful server, the opposite of serverless.
#
# Configure via a local ".env" file (copy from .env.example). Data lives in the
# named volumes below, so workflows/credentials survive restarts & upgrades.
name: n8n

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - n8n_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 12

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # --- Database (store workflows/executions in Postgres, not SQLite) ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      # --- Security: encrypts saved credentials. MUST stay constant. ---
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in .env}
      # --- Public addressing (override for production/https) ---
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      # --- Misc ---
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Jakarta}
      TZ: ${GENERIC_TIMEZONE:-Asia/Jakarta}
      N8N_RUNNERS_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_db:
  n8n_data:
